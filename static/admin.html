<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>admin - the feed</title>
<link rel="icon" href="/favicon.ico" sizes="48x48">
<meta name="theme-color" content="#0e0c0b">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0c0b; --surface: #1a1714; --surface-raised: #211d19;
  --cream: #f4efe8; --cream-dim: #a89e91; --accent: #c4573a; --accent-glow: #e0714f;
  --serif: 'Instrument Serif', 'Georgia', serif;
  --sans: 'DM Sans', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--cream); font-family: var(--sans); min-height: 100dvh; }
.shell { max-width: 560px; margin: 0 auto; padding: 2rem 1rem 4rem; }
.masthead { text-align: center; padding: 2rem 0 1.5rem; margin-bottom: 2rem; border-bottom: 1px solid rgba(244,239,232,0.08); position: relative; }
.masthead::after { content: ''; position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%); width: 40px; height: 3px; background: var(--accent); }
.masthead h1 { font-family: var(--serif); font-size: 2rem; font-weight: 400; }
.masthead h1 span { color: var(--cream-dim); font-size: 0.5em; font-family: var(--sans); text-transform: uppercase; letter-spacing: 0.2em; display: block; margin-top: 0.3rem; }

/* Login */
.login-box { max-width: 300px; margin: 4rem auto; text-align: center; animation: fadeIn 0.4s var(--ease); }
.login-box input {
  width: 100%; background: var(--surface); border: 1px solid rgba(244,239,232,0.08); border-radius: 6px;
  color: var(--cream); font-family: var(--mono); font-size: 0.9rem; padding: 0.7rem 0.85rem;
  outline: none; text-align: center; margin-bottom: 0.75rem; transition: border-color 0.2s;
}
.login-box input::placeholder { color: var(--cream-dim); opacity: 0.4; }
.login-box input:focus { border-color: var(--accent); }
.login-box button {
  background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 0.55rem 2rem;
  font-family: var(--sans); font-size: 0.82rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.1em; cursor: pointer; transition: background 0.2s;
}
.login-box button:hover { background: var(--accent-glow); }
.login-err { color: var(--accent-glow); font-size: 0.78rem; margin-top: 0.5rem; min-height: 1.2em; }

/* Dashboard */
.dash { animation: fadeIn 0.5s var(--ease); }
.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem; margin-bottom: 1.5rem; }
.stat-card {
  background: var(--surface); border: 1px solid rgba(244,239,232,0.06); border-radius: 8px;
  padding: 1rem; text-align: center; transition: border-color 0.2s;
}
.stat-card:hover { border-color: rgba(196,87,58,0.25); }
.stat-val { font-family: var(--mono); font-size: 1.6rem; font-weight: 500; color: var(--cream); line-height: 1.2; }
.stat-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--cream-dim); margin-top: 0.3rem; }

.section-title {
  font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.25em;
  color: var(--cream-dim); margin-bottom: 0.6rem; margin-top: 1.5rem;
}

/* Top posters */
.poster-list { list-style: none; }
.poster-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0.5rem 0.75rem; background: var(--surface); border-radius: 6px; margin-bottom: 0.35rem;
  border: 1px solid rgba(244,239,232,0.04);
}
.poster-rank { font-family: var(--mono); font-size: 0.7rem; color: var(--cream-dim); width: 1.5em; }
.poster-name { font-family: var(--serif); font-style: italic; font-size: 0.95rem; flex: 1; margin-left: 0.5rem; }
.poster-count { font-family: var(--mono); font-size: 0.82rem; color: var(--accent-glow); }

/* Reactions breakdown */
.react-row { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 0.25rem; }
.react-pill {
  background: var(--surface); border: 1px solid rgba(244,239,232,0.06); border-radius: 20px;
  padding: 0.35rem 0.8rem; font-size: 0.85rem; display: flex; align-items: center; gap: 0.35rem;
}
.react-pill span { font-family: var(--mono); font-size: 0.78rem; color: var(--cream-dim); }

/* DB size */
.meta-row {
  display: flex; justify-content: space-between; padding: 0.5rem 0.75rem;
  background: var(--surface); border-radius: 6px; border: 1px solid rgba(244,239,232,0.04);
  font-size: 0.82rem;
}
.meta-row .label { color: var(--cream-dim); }
.meta-row .val { font-family: var(--mono); color: var(--cream); }

.logout-row { text-align: center; margin-top: 2rem; }
.logout-btn {
  background: none; border: 1px solid rgba(244,239,232,0.1); border-radius: 6px;
  color: var(--cream-dim); padding: 0.4rem 1.2rem; font-family: var(--sans);
  font-size: 0.75rem; cursor: pointer; transition: color 0.2s, border-color 0.2s;
}
.logout-btn:hover { color: var(--cream); border-color: var(--accent); }
.back-link { display: block; text-align: center; margin-top: 0.75rem; font-size: 0.72rem; color: var(--cream-dim); text-decoration: none; }
.back-link:hover { color: var(--accent); }

.empty { text-align: center; color: var(--cream-dim); font-style: italic; padding: 1rem 0; font-size: 0.85rem; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@media (max-width: 480px) { .stat-grid { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>
<div id="app">
  <div class="shell">
    <header class="masthead">
      <h1>the feed <span>admin</span></h1>
    </header>

    <!-- LOGIN -->
    <div v-if="!token" class="login-box">
      <input v-model="password" type="password" placeholder="password" @keydown.enter="login" autofocus />
      <br>
      <button @click="login" :disabled="loggingIn">{{ loggingIn ? '...' : 'log in' }}</button>
      <div class="login-err">{{ loginErr }}</div>
    </div>

    <!-- DASHBOARD -->
    <div v-else class="dash">
      <div v-if="loading" class="empty">loading stats...</div>
      <template v-else>
        <div class="stat-grid">
          <div class="stat-card">
            <div class="stat-val">{{ s.total_posts }}</div>
            <div class="stat-label">posts</div>
          </div>
          <div class="stat-card">
            <div class="stat-val">{{ s.total_replies }}</div>
            <div class="stat-label">replies</div>
          </div>
          <div class="stat-card">
            <div class="stat-val">{{ s.total_reactions }}</div>
            <div class="stat-label">reactions</div>
          </div>
          <div class="stat-card">
            <div class="stat-val">{{ s.unique_authors }}</div>
            <div class="stat-label">authors</div>
          </div>
          <div class="stat-card">
            <div class="stat-val">{{ s.posts_today }}</div>
            <div class="stat-label">today</div>
          </div>
          <div class="stat-card">
            <div class="stat-val">{{ s.posts_this_week }}</div>
            <div class="stat-label">this week</div>
          </div>
        </div>

        <div v-if="s.top_posters.length">
          <div class="section-title">top posters</div>
          <ul class="poster-list">
            <li v-for="(p, i) in s.top_posters" :key="p.author" class="poster-row">
              <span class="poster-rank">{{ i + 1 }}</span>
              <span class="poster-name">{{ p.author }}</span>
              <span class="poster-count">{{ p.count }}</span>
            </li>
          </ul>
        </div>

        <div v-if="Object.keys(s.reaction_breakdown).length">
          <div class="section-title">reactions</div>
          <div class="react-row">
            <div v-for="(count, emoji) in s.reaction_breakdown" :key="emoji" class="react-pill">
              {{ emoji }} <span>{{ count }}</span>
            </div>
          </div>
        </div>

        <div class="section-title">storage</div>
        <div class="meta-row">
          <span class="label">database size</span>
          <span class="val">{{ formatBytes(s.db_size_bytes) }}</span>
        </div>

        <div class="logout-row">
          <button class="logout-btn" @click="logout">log out</button>
        </div>
      </template>
      <a href="/" class="back-link">&larr; back to feed</a>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.4.21/vue.global.prod.min.js"></script>
<script>
const { createApp, ref, onMounted } = Vue;
const SESS_KEY = 'feed_admin';

createApp({
  setup() {
    const password = ref('');
    const loginErr = ref('');
    const loggingIn = ref(false);
    const token = ref(sessionStorage.getItem(SESS_KEY) || '');
    const loading = ref(false);
    const s = ref({});

    async function login() {
      if (!password.value || loggingIn.value) return;
      loggingIn.value = true;
      loginErr.value = '';
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: password.value }),
        });
        const data = await res.json();
        if (!res.ok) { loginErr.value = data.error || 'login failed'; return; }
        token.value = data.token;
        sessionStorage.setItem(SESS_KEY, data.token);
        password.value = '';
        fetchStats();
      } catch { loginErr.value = 'network error'; }
      finally { loggingIn.value = false; }
    }

    async function fetchStats() {
      loading.value = true;
      try {
        const res = await fetch('/api/admin/stats', {
          headers: { 'Authorization': 'Bearer ' + token.value },
        });
        if (res.status === 401) { logout(); return; }
        if (!res.ok) return;
        s.value = await res.json();
      } catch {}
      finally { loading.value = false; }
    }

    function logout() {
      token.value = '';
      sessionStorage.removeItem(SESS_KEY);
    }

    function formatBytes(b) {
      if (!b) return '0 B';
      if (b < 1024) return b + ' B';
      if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
      return (b / 1048576).toFixed(1) + ' MB';
    }

    onMounted(() => { if (token.value) fetchStats(); });

    return { password, loginErr, loggingIn, token, loading, s, login, logout, formatBytes };
  },
}).mount('#app');
</script>
</body>
</html>
