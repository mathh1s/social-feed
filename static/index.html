<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>the feed</title>
<link rel="icon" href="/favicon.ico" sizes="48x48">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon-32x32.png" type="image/png" sizes="32x32">
<link rel="icon" href="/favicon-16x16.png" type="image/png" sizes="16x16">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#0e0c0b">
<script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.4.21/vue.global.prod.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0c0b;
    --surface: #1a1714;
    --surface-raised: #211d19;
    --card: #f4efe8;
    --card-alt: #ebe4da;
    --ink: #0e0c0b;
    --ink-light: #5a5349;
    --accent: #c4573a;
    --accent-glow: #e0714f;
    --accent-soft: rgba(196,87,58,0.12);
    --cream: #f4efe8;
    --cream-dim: #a89e91;
    --danger: #c43a3a;
    --serif: 'Instrument Serif', 'Georgia', serif;
    --sans: 'DM Sans', system-ui, sans-serif;
    --mono: 'JetBrains Mono', monospace;
    --grain: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { font-size: 16px; -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg); color: var(--cream); font-family: var(--sans);
    min-height: 100dvh; overflow-x: hidden;
    &::before { content: ''; position: fixed; inset: 0; background: var(--grain); pointer-events: none; z-index: 9999; mix-blend-mode: overlay; }
  }
  .shell { max-width: 620px; margin: 0 auto; padding: 1.5rem 1rem 6rem; }
  @media (min-width: 640px) { .shell { padding: 2rem 1.25rem 6rem; } }

  /* MASTHEAD */
  .masthead {
    text-align: center; padding: 2.5rem 0 2rem; border-bottom: 1px solid rgba(244,239,232,0.08);
    margin-bottom: 2rem; position: relative; animation: fadeDown 0.6s var(--ease) both;
    &::after { content: ''; position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%); width: 60px; height: 3px; background: var(--accent); }
    & h1 { font-family: var(--serif); font-size: clamp(2.6rem, 8vw, 4.5rem); font-weight: 400; letter-spacing: -0.02em; line-height: 1; }
    & .tagline { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.25em; color: var(--cream-dim); margin-top: 0.6rem; }
  }

  /* COMPOSER */
  .composer {
    background: var(--surface); border: 1px solid rgba(244,239,232,0.06); border-radius: 8px;
    padding: 1.25rem; margin-bottom: 2rem; transition: border-color 0.3s, box-shadow 0.3s;
    animation: fadeDown 0.6s var(--ease) 0.1s both;
    &:focus-within { border-color: rgba(196,87,58,0.35); box-shadow: 0 0 0 3px rgba(196,87,58,0.06); }
    & .composer-top { display: flex; gap: 0.85rem; margin-bottom: 0.85rem; align-items: flex-start; }
    & .reply-indicator { font-size: 0.78rem; color: var(--accent-glow); margin-bottom: 0.6rem; display: flex; align-items: center; gap: 0.4rem;
      & button { background: none; border: none; color: var(--cream-dim); cursor: pointer; font-size: 0.9rem; padding: 0 4px; &:hover { color: var(--cream); } }
    }
  }
  .avatar-picker {
    flex-shrink: 0; width: 48px; height: 48px; border-radius: 50%;
    border: 2px dashed rgba(244,239,232,0.15); display: flex; align-items: center;
    justify-content: center; cursor: pointer; overflow: hidden; transition: border-color 0.2s, transform 0.15s;
    position: relative; background: var(--bg);
    &:hover { border-color: var(--accent); transform: scale(1.04); }
    &.has-image { border-style: solid; border-color: var(--accent); }
    & img { width: 100%; height: 100%; object-fit: cover; }
    & .avatar-placeholder { color: var(--cream-dim); font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.05em; text-align: center; line-height: 1.3; opacity: 0.5; }
    & .avatar-remove { position: absolute; top: -3px; right: -3px; width: 16px; height: 16px; background: var(--danger); color: #fff; border: 2px solid var(--surface); border-radius: 50%; font-size: 10px; cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center; }
  }
  .composer-fields { flex: 1; min-width: 0; }
  .composer-row { display: flex; gap: 0.6rem; margin-bottom: 0.6rem; }
  .composer input[type="text"], .composer textarea {
    width: 100%; background: var(--bg); border: 1px solid rgba(244,239,232,0.08); border-radius: 6px;
    color: var(--cream); font-family: var(--sans); font-size: 0.88rem; padding: 0.6rem 0.75rem;
    outline: none; transition: border-color 0.2s, background 0.2s;
    &::placeholder { color: var(--cream-dim); opacity: 0.45; }
    &:focus { border-color: var(--accent); background: var(--surface-raised); }
  }
  .composer input[type="text"] { flex: 1; }
  .char-count { font-size: 0.7rem; color: var(--cream-dim); align-self: center; min-width: 48px; text-align: right; font-variant-numeric: tabular-nums; opacity: 0.7; &.warn { color: var(--accent); opacity: 1; } &.over { color: var(--danger); opacity: 1; } }
  .composer textarea { resize: vertical; min-height: 68px; line-height: 1.55; }
  .image-preview { margin-top: 0.6rem; position: relative; display: inline-block; max-width: 100%;
    & img { max-width: 100%; max-height: 180px; border-radius: 6px; display: block; object-fit: contain; background: var(--bg); border: 1px solid rgba(244,239,232,0.08); }
    & .image-remove { position: absolute; top: 6px; right: 6px; width: 22px; height: 22px; background: rgba(14,12,11,0.8); color: #fff; border: none; border-radius: 50%; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); &:hover { background: var(--danger); } }
  }
  .composer-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 0.75rem; }
  .composer-left { display: flex; align-items: center; gap: 0.75rem; }
  .error-msg { font-size: 0.78rem; color: var(--accent-glow); }
  .attach-btn { background: none; border: 1px solid rgba(244,239,232,0.1); border-radius: 6px; color: var(--cream-dim); padding: 0.35rem 0.6rem; font-size: 0.78rem; font-family: var(--sans); cursor: pointer; transition: color 0.2s, border-color 0.2s; display: flex; align-items: center; gap: 0.35rem;
    &:hover { color: var(--cream); border-color: var(--accent); }
    & svg { width: 14px; height: 14px; }
  }
  .submit-btn { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 0.5rem 1.4rem; font-family: var(--sans); font-size: 0.82rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    &:hover:not(:disabled) { background: var(--accent-glow); box-shadow: 0 2px 12px rgba(196,87,58,0.3); }
    &:active:not(:disabled) { transform: scale(0.96); }
    &:disabled { opacity: 0.35; cursor: not-allowed; }
  }

  /* NEW POSTS BANNER */
  .new-banner { text-align: center; margin-bottom: 1rem; animation: slideDown 0.35s var(--ease) both;
    & button { background: var(--accent-soft); color: var(--accent-glow); border: 1px solid rgba(196,87,58,0.2); border-radius: 20px; padding: 0.4rem 1.2rem; font-family: var(--sans); font-size: 0.78rem; font-weight: 600; cursor: pointer; &:hover { background: rgba(196,87,58,0.2); } }
  }

  /* FEED */
  .feed-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.3em; color: var(--cream-dim); margin-bottom: 1rem; opacity: 0.7; }

  .post {
    background: var(--card); color: var(--ink); border-radius: 6px; padding: 1.1rem 1.25rem;
    margin-bottom: 0.6rem; position: relative; display: flex; gap: 0.85rem; transition: transform 0.2s var(--ease);
    &.entering { animation: slideUp 0.4s var(--ease) both; }
    &:nth-child(even) { background: var(--card-alt); }
    &::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); border-radius: 6px 0 0 6px; opacity: 0; transition: opacity 0.25s; }
    &:hover::before { opacity: 1; }
    &:hover { transform: translateX(2px); }
  }
  .post-avatar { flex-shrink: 0; width: 36px; height: 36px; border-radius: 50%; overflow: hidden; background: rgba(0,0,0,0.06); display: flex; align-items: center; justify-content: center; margin-top: 2px;
    & img { width: 100%; height: 100%; object-fit: cover; }
    & .initials { font-family: var(--serif); font-size: 0.9rem; font-style: italic; color: var(--ink-light); text-transform: uppercase; }
  }
  .post-body { flex: 1; min-width: 0; }
  .post-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.35rem; gap: 0.5rem; }
  .post-author { font-family: var(--serif); font-size: 1.05rem; font-style: italic; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .post-time { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-light); white-space: nowrap; flex-shrink: 0; }

  /* MARKDOWN CONTENT */
  .post-content {
    font-size: 0.9rem; line-height: 1.6; color: var(--ink); word-break: break-word; overflow-wrap: anywhere;
    & p { margin-bottom: 0.4em; &:last-child { margin-bottom: 0; } }
    & strong { font-weight: 700; }
    & em { font-style: italic; }
    & code { font-family: var(--mono); font-size: 0.82em; background: rgba(0,0,0,0.06); padding: 0.15em 0.35em; border-radius: 3px; }
    & pre { background: rgba(0,0,0,0.06); border-radius: 6px; padding: 0.75rem; margin: 0.5em 0; overflow-x: auto;
      & code { background: none; padding: 0; font-size: 0.8em; }
    }
    & a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; &:hover { color: var(--accent-glow); } }
    & blockquote { border-left: 3px solid rgba(0,0,0,0.15); padding-left: 0.75rem; margin: 0.4em 0; color: var(--ink-light); font-style: italic; }
    & ul, & ol { padding-left: 1.4rem; margin: 0.3em 0; }
  }

  /* POST IMAGE */
  .post-image { margin-top: 0.6rem;
    & img { max-width: 100%; max-height: 400px; border-radius: 6px; display: block; object-fit: contain; background: rgba(0,0,0,0.03); cursor: pointer; transition: transform 0.2s var(--ease); &:hover { transform: scale(1.01); } }
  }

  /* LINK PREVIEW CARD */
  .link-preview { margin-top: 0.6rem; border: 1px solid rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; text-decoration: none; display: block; transition: border-color 0.2s, box-shadow 0.2s; cursor: pointer;
    &:hover { border-color: rgba(0,0,0,0.2); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    & .lp-image { width: 100%; max-height: 200px; object-fit: cover; display: block; }
    & .lp-body { padding: 0.7rem 0.85rem; }
    & .lp-site { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-light); margin-bottom: 0.25rem; }
    & .lp-title { font-size: 0.88rem; font-weight: 600; color: var(--ink); line-height: 1.3; margin-bottom: 0.2rem; }
    & .lp-desc { font-size: 0.78rem; color: var(--ink-light); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  }

  /* REPLIES */
  .reply-actions { margin-top: 0.5rem; display: flex; gap: 0.75rem; }
  .reply-btn, .toggle-replies-btn { background: none; border: none; color: var(--ink-light); font-size: 0.72rem; font-family: var(--sans); cursor: pointer; padding: 2px 0; transition: color 0.15s; &:hover { color: var(--accent); } }
  .replies-section { margin-top: 0.5rem; padding-left: 0.75rem; border-left: 2px solid rgba(0,0,0,0.08); }
  .reply-post { padding: 0.6rem 0; display: flex; gap: 0.6rem; &:not(:last-child) { border-bottom: 1px solid rgba(0,0,0,0.05); } }
  .reply-post .post-avatar { width: 28px; height: 28px; }
  .reply-post .post-author { font-size: 0.9rem; }
  .reply-post .post-content { font-size: 0.84rem; }
  .reply-post .post-time { font-size: 0.6rem; }
  .reply-composer { margin-top: 0.5rem; display: flex; gap: 0.5rem; align-items: flex-end; }
  .reply-composer textarea { flex: 1; background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.1); border-radius: 6px; color: var(--ink); font-family: var(--sans); font-size: 0.82rem; padding: 0.45rem 0.6rem; resize: none; min-height: 36px; max-height: 100px; outline: none; &:focus { border-color: var(--accent); } &::placeholder { color: var(--ink-light); opacity: 0.5; } }
  .reply-composer button { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 0.4rem 0.8rem; font-size: 0.75rem; font-weight: 700; font-family: var(--sans); cursor: pointer; white-space: nowrap; &:disabled { opacity: 0.35; cursor: not-allowed; } }
  .replies-loading { font-size: 0.75rem; color: var(--ink-light); padding: 0.4rem 0; }

  /* LIGHTBOX */
  .lightbox { position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; cursor: zoom-out; animation: fadeIn 0.2s ease both; backdrop-filter: blur(8px);
    & img { max-width: 95vw; max-height: 95vh; object-fit: contain; border-radius: 4px; }
  }

  /* SKELETON / LOADING */
  .skeleton-post { background: var(--surface); border-radius: 6px; padding: 1.1rem 1.25rem; margin-bottom: 0.6rem; display: flex; gap: 0.85rem; animation: pulse 1.5s ease-in-out infinite;
    & .sk-avatar { width: 36px; height: 36px; border-radius: 50%; background: rgba(244,239,232,0.06); }
    & .sk-body { flex: 1; }
    & .sk-line { height: 12px; border-radius: 6px; background: rgba(244,239,232,0.06); margin-bottom: 8px; &:first-child { width: 35%; } &:nth-child(2) { width: 90%; } &:nth-child(3) { width: 60%; } }
  }
  .load-more-trigger { height: 1px; }
  .loading-more { text-align: center; padding: 1.5rem 0; color: var(--cream-dim); font-size: 0.8rem;
    & .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(244,239,232,0.15); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 0.5rem; }
  }
  .end-of-feed { text-align: center; padding: 2rem 0 1rem; color: var(--cream-dim); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.2em; opacity: 0.5; }
  .empty { text-align: center; padding: 4rem 1rem; color: var(--cream-dim); font-style: italic; animation: fadeDown 0.5s var(--ease) both; }

  /* TOAST */
  .toast-container { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); z-index: 10001; display: flex; flex-direction: column; gap: 0.5rem; align-items: center; pointer-events: none; }
  .toast { background: var(--surface-raised); color: var(--cream); border: 1px solid rgba(244,239,232,0.1); border-radius: 8px; padding: 0.6rem 1.2rem; font-size: 0.82rem; box-shadow: 0 8px 30px rgba(0,0,0,0.4); animation: toastIn 0.35s var(--ease) both; pointer-events: auto;
    &.leaving { animation: toastOut 0.25s ease-in both; }
    &.error { border-color: rgba(196,58,58,0.3); }
  }

  /* ANIMATIONS */
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes toastIn { from { opacity: 0; transform: translateY(12px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(8px) scale(0.95); } }

  @media (max-width: 480px) {
    .composer { padding: 1rem; }
    .avatar-picker { width: 42px; height: 42px; }
    .post { padding: 1rem; gap: 0.7rem; }
    .post-avatar { width: 32px; height: 32px; }
    .post-author { font-size: 0.95rem; }
    .post-content { font-size: 0.85rem; }
  }
</style>
</head>
<body>
<div id="app">
  <div class="shell">
    <header class="masthead">
      <h1>the feed</h1>
      <p class="tagline">Unfiltered &middot; Unmoderated &middot; Unsigned</p>
    </header>

    <!-- COMPOSER -->
    <section class="composer">
      <div v-if="replyingTo" class="reply-indicator">
        replying to <strong>{{ replyingTo.author }}</strong>
        <button @click="replyingTo = null" title="Cancel">&times;</button>
      </div>
      <div class="composer-top">
        <div class="avatar-picker" :class="{ 'has-image': avatarData }" @click="!avatarData && $refs.avatarInput.click()">
          <img v-if="avatarData" :src="avatarData" alt="" />
          <span v-else class="avatar-placeholder">add<br>pic</span>
          <button v-if="avatarData" class="avatar-remove" @click.stop="clearAvatar">&times;</button>
        </div>
        <input ref="avatarInput" type="file" accept="image/png,image/jpeg,image/gif,image/webp" hidden @change="handleAvatar" />
        <div class="composer-fields">
          <div class="composer-row">
            <input v-model="author" type="text" placeholder="your name" maxlength="40" @keydown.enter="$refs.contentBox.focus()" />
            <span class="char-count" :class="{ warn: content.length > 400, over: content.length > 500 }">{{ content.length }}/500</span>
          </div>
          <textarea ref="contentBox" v-model="content" :placeholder="replyingTo ? 'write a reply...' : 'what\'s on your mind? (markdown supported)'" maxlength="500" @keydown.ctrl.enter="submit" @keydown.meta.enter="submit"></textarea>
          <div v-if="imageData" class="image-preview">
            <img :src="imageData" alt="" />
            <button class="image-remove" @click="imageData = ''">&times;</button>
          </div>
        </div>
      </div>
      <div class="composer-footer">
        <div class="composer-left">
          <button class="attach-btn" @click="$refs.imageInput.click()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
            image
          </button>
          <input ref="imageInput" type="file" accept="image/png,image/jpeg,image/gif,image/webp" hidden @change="handleImage" />
          <span class="error-msg">{{ error }}</span>
        </div>
        <button class="submit-btn" :disabled="sending || !canSubmit" @click="submit">{{ sending ? '...' : (replyingTo ? 'Reply' : 'Post') }}</button>
      </div>
    </section>

    <div v-if="pendingPosts.length" class="new-banner">
      <button @click="mergePending">{{ pendingPosts.length }} new post{{ pendingPosts.length > 1 ? 's' : '' }}</button>
    </div>

    <!-- SKELETON -->
    <template v-if="initialLoading">
      <div v-for="i in 4" :key="'sk-'+i" class="skeleton-post" :style="{animationDelay:(i*0.1)+'s'}">
        <div class="sk-avatar"></div>
        <div class="sk-body"><div class="sk-line"></div><div class="sk-line"></div><div class="sk-line"></div></div>
      </div>
    </template>

    <!-- FEED -->
    <template v-else>
      <p v-if="posts.length" class="feed-label">Latest</p>
      <article v-for="post in posts" :key="post.id" class="post" :class="{ entering: post._new }">
        <div class="post-avatar">
          <img v-if="post.avatar" :src="post.avatar" alt="" />
          <span v-else class="initials">{{ initials(post.author) }}</span>
        </div>
        <div class="post-body">
          <div class="post-header">
            <span class="post-author">{{ post.author }}</span>
            <span class="post-time">{{ post._ago }}</span>
          </div>
          <div class="post-content" v-html="renderMd(post.content)"></div>
          <div v-if="post.image" class="post-image">
            <img :src="post.image" alt="" @click="lightboxSrc = post.image" />
          </div>
          <a v-if="post._preview" class="link-preview" :href="post._preview.url" target="_blank" rel="noopener" @click.stop>
            <img v-if="post._preview.image" class="lp-image" :src="post._preview.image" alt="" />
            <div class="lp-body">
              <div v-if="post._preview.site_name" class="lp-site">{{ post._preview.site_name }}</div>
              <div class="lp-title">{{ post._preview.title }}</div>
              <div v-if="post._preview.description" class="lp-desc">{{ post._preview.description }}</div>
            </div>
          </a>
          <!-- Reply actions -->
          <div class="reply-actions">
            <button class="reply-btn" @click="startReply(post)">reply</button>
            <button v-if="post.reply_count > 0" class="toggle-replies-btn" @click="toggleReplies(post)">
              {{ post._showReplies ? 'hide' : 'show' }} {{ post.reply_count }} repl{{ post.reply_count === 1 ? 'y' : 'ies' }}
            </button>
          </div>
          <!-- Replies -->
          <div v-if="post._showReplies" class="replies-section">
            <div v-if="post._loadingReplies" class="replies-loading">loading...</div>
            <div v-for="reply in post._replies" :key="reply.id" class="reply-post">
              <div class="post-avatar">
                <img v-if="reply.avatar" :src="reply.avatar" alt="" />
                <span v-else class="initials">{{ initials(reply.author) }}</span>
              </div>
              <div class="post-body">
                <div class="post-header">
                  <span class="post-author">{{ reply.author }}</span>
                  <span class="post-time">{{ computeAgo(reply.created_at) }}</span>
                </div>
                <div class="post-content" v-html="renderMd(reply.content)"></div>
                <div v-if="reply.image" class="post-image">
                  <img :src="reply.image" alt="" @click="lightboxSrc = reply.image" />
                </div>
              </div>
            </div>
            <!-- Inline reply composer -->
            <div class="reply-composer">
              <textarea v-model="post._replyText" placeholder="reply..." maxlength="500" rows="1" @keydown.ctrl.enter="submitReply(post)" @keydown.meta.enter="submitReply(post)"></textarea>
              <button :disabled="!post._replyText?.trim()" @click="submitReply(post)">send</button>
            </div>
          </div>
        </div>
      </article>

      <div ref="sentinel" class="load-more-trigger"></div>
      <div v-if="loadingMore" class="loading-more"><span class="spinner"></span> loading...</div>
      <div v-if="!hasMore && posts.length > 5" class="end-of-feed">end of feed</div>
      <div v-if="!posts.length && !pendingPosts.length" class="empty">Nothing here yet. Be the first to post.</div>
    </template>
  </div>

  <div v-if="lightboxSrc" class="lightbox" @click="lightboxSrc = ''"><img :src="lightboxSrc" alt="" /></div>
  <div class="toast-container">
    <div v-for="t in toasts" :key="t.id" class="toast" :class="[t.type, { leaving: t.leaving }]">{{ t.msg }}</div>
  </div>
</div>

<script>
const API = '/api/posts';
const POLL_INTERVAL = 5000;
const TIMESTAMP_INTERVAL = 30000;
const MAX_AVATAR_DIM = 128;
const MAX_IMAGE_DIM = 800;
const PAGE_SIZE = 20;
const STORAGE_KEY = 'feed_user';

// Configure marked
marked.setOptions({ breaks: true, gfm: true });

const { createApp, ref, computed, watch, onMounted, onUnmounted, nextTick } = Vue;

// --- Sound effects via Web Audio API ---
const SFX = {
  _ctx: null,
  _getCtx() {
    if (!this._ctx) this._ctx = new (window.AudioContext || window.webkitAudioContext)();
    return this._ctx;
  },
  play(freq, dur, type = 'sine', vol = 0.15) {
    try {
      const ctx = this._getCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      gain.gain.setValueAtTime(vol, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      osc.connect(gain).connect(ctx.destination);
      osc.start(); osc.stop(ctx.currentTime + dur);
    } catch (e) { /* audio not available */ }
  },
  sent() { this.play(880, 0.12, 'sine', 0.1); setTimeout(() => this.play(1100, 0.1, 'sine', 0.08), 80); },
  newPost() { this.play(660, 0.15, 'triangle', 0.08); },
};

createApp({
  setup() {
    const author = ref('');
    const content = ref('');
    const avatarData = ref('');
    const imageData = ref('');
    const error = ref('');
    const sending = ref(false);
    const posts = ref([]);
    const pendingPosts = ref([]);
    const initialLoading = ref(true);
    const loadingMore = ref(false);
    const hasMore = ref(true);
    const toasts = ref([]);
    const sentinel = ref(null);
    const lightboxSrc = ref('');
    const replyingTo = ref(null);

    let pollTimer, timestampTimer, observer, toastCounter = 0;

    const canSubmit = computed(() => author.value.trim().length > 0 && content.value.trim().length > 0);

    // --- localStorage ---
    function loadUser() {
      try { const d = JSON.parse(localStorage.getItem(STORAGE_KEY)); if (d?.author) author.value = d.author; if (d?.avatar) avatarData.value = d.avatar; } catch {}
    }
    function saveUser() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ author: author.value, avatar: avatarData.value })); } catch {}
    }
    watch(author, saveUser);
    watch(avatarData, saveUser);

    // --- Toasts ---
    function toast(msg, type = 'success') {
      const id = ++toastCounter;
      toasts.value.push({ id, msg, type, leaving: false });
      setTimeout(() => { const t = toasts.value.find(x => x.id === id); if (t) t.leaving = true; setTimeout(() => { toasts.value = toasts.value.filter(x => x.id !== id); }, 300); }, 2500);
    }

    // --- Markdown ---
    function renderMd(text) {
      return DOMPurify.sanitize(marked.parse(text), { ALLOWED_TAGS: ['p','br','strong','em','code','pre','a','blockquote','ul','ol','li','del','h1','h2','h3','h4','hr'], ALLOWED_ATTR: ['href','target','rel'], ADD_ATTR: ['target'] });
    }

    // --- Timestamps ---
    function computeAgo(iso) {
      const diff = (Date.now() - new Date(iso).getTime()) / 1000;
      if (diff < 10) return 'now'; if (diff < 60) return Math.floor(diff) + 's';
      if (diff < 3600) return Math.floor(diff / 60) + 'm'; if (diff < 86400) return Math.floor(diff / 3600) + 'h';
      const d = Math.floor(diff / 86400); if (d < 30) return d + 'd'; return Math.floor(d / 30) + 'mo';
    }
    function refreshTimestamps() { posts.value.forEach(p => { p._ago = computeAgo(p.created_at); }); }

    function enrichPost(p, isNew = false) {
      p._ago = computeAgo(p.created_at);
      p._new = isNew;
      p._preview = null;
      p._replies = [];
      p._showReplies = false;
      p._loadingReplies = false;
      p._replyText = '';
      if (p.preview) {
        try { p._preview = JSON.parse(p.preview); } catch {}
      }
      return p;
    }

    // --- Fetch ---
    async function fetchInitial() {
      try {
        const res = await fetch(`${API}?limit=${PAGE_SIZE}`);
        if (!res.ok) throw new Error();
        const data = await res.json();
        posts.value = data.posts.map(p => enrichPost(p));
        hasMore.value = data.has_more;
      } catch { toast('failed to load posts', 'error'); }
      finally { initialLoading.value = false; }
    }

    async function loadMore() {
      if (loadingMore.value || !hasMore.value || !posts.value.length) return;
      loadingMore.value = true;
      try {
        const res = await fetch(`${API}?before_id=${posts.value.at(-1).id}&limit=${PAGE_SIZE}`);
        if (!res.ok) throw new Error();
        const data = await res.json();
        data.posts.forEach(p => posts.value.push(enrichPost(p)));
        hasMore.value = data.has_more;
      } catch {}
      finally { loadingMore.value = false; }
    }

    // --- Polling ---
    function highestId() { return pendingPosts.value[0]?.id || posts.value[0]?.id || 0; }

    async function poll() {
      try {
        const res = await fetch(`${API}/new?after_id=${highestId()}`);
        if (!res.ok) return;
        const data = await res.json();
        if (data.length) {
          data.forEach(p => enrichPost(p, true));
          pendingPosts.value = [...data, ...pendingPosts.value];
          SFX.newPost();
        }
      } catch {}
    }

    function mergePending() {
      posts.value = [...pendingPosts.value, ...posts.value];
      pendingPosts.value = [];
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // --- Submit ---
    async function submit() {
      if (!canSubmit.value || sending.value) return;
      error.value = ''; sending.value = true;
      try {
        const body = {
          author: author.value.trim(), avatar: avatarData.value,
          content: content.value.trim(), image: imageData.value,
        };
        if (replyingTo.value) body.parent_id = replyingTo.value.id;
        const res = await fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        const data = await res.json();
        if (!res.ok) { error.value = data.error || 'something went wrong'; toast(data.error || 'failed', 'error'); return; }

        if (replyingTo.value) {
          // Add to parent's replies if open
          const parent = posts.value.find(p => p.id === replyingTo.value.id);
          if (parent) {
            parent.reply_count++;
            if (parent._showReplies) parent._replies.push(data);
          }
          replyingTo.value = null;
          toast('replied');
        } else {
          posts.value.unshift(enrichPost(data, true));
          toast('posted');
        }
        content.value = ''; imageData.value = '';
        SFX.sent();
      } catch { error.value = 'network error'; toast('network error', 'error'); }
      finally { sending.value = false; }
    }

    // --- Replies ---
    function startReply(post) {
      replyingTo.value = post;
      nextTick(() => {
        const el = document.querySelector('.composer textarea');
        if (el) { el.focus(); el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
      });
    }

    async function toggleReplies(post) {
      if (post._showReplies) { post._showReplies = false; return; }
      post._showReplies = true;
      post._loadingReplies = true;
      try {
        const res = await fetch(`${API}/replies?post_id=${post.id}`);
        if (!res.ok) throw new Error();
        post._replies = await res.json();
      } catch { toast('failed to load replies', 'error'); }
      finally { post._loadingReplies = false; }
    }

    async function submitReply(post) {
      const text = post._replyText?.trim();
      if (!text || !author.value.trim()) { toast('name and reply required', 'error'); return; }
      try {
        const res = await fetch(API, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ parent_id: post.id, author: author.value.trim(), avatar: avatarData.value, content: text, image: '' }),
        });
        const data = await res.json();
        if (!res.ok) { toast(data.error || 'failed', 'error'); return; }
        post._replies.push(data);
        post.reply_count++;
        post._replyText = '';
        SFX.sent();
      } catch { toast('network error', 'error'); }
    }

    // --- Images ---
    function processImage(file, maxDim, q, cb) {
      const r = new FileReader();
      r.onload = () => { const img = new Image(); img.onload = () => {
        const c = document.createElement('canvas'); let w = img.width, h = img.height;
        if (w > maxDim || h > maxDim) { const s = maxDim / Math.max(w, h); w = Math.round(w * s); h = Math.round(h * s); }
        c.width = w; c.height = h; c.getContext('2d').drawImage(img, 0, 0, w, h); cb(c.toDataURL('image/jpeg', q));
      }; img.src = r.result; }; r.readAsDataURL(file);
    }
    function validateFile(file, maxMB) {
      if (file.size > maxMB * 1024 * 1024) { error.value = `too large (max ${maxMB}MB)`; return false; }
      if (!['image/png','image/jpeg','image/gif','image/webp'].includes(file.type)) { error.value = 'only png/jpeg/gif/webp'; return false; }
      return true;
    }
    function handleAvatar(e) { const f = e.target.files[0]; if (!f) return; if (!validateFile(f, 2)) return; processImage(f, MAX_AVATAR_DIM, 0.8, d => { avatarData.value = d; error.value = ''; }); e.target.value = ''; }
    function clearAvatar() { avatarData.value = ''; }
    function handleImage(e) { const f = e.target.files[0]; if (!f) return; if (!validateFile(f, 5)) return; processImage(f, MAX_IMAGE_DIM, 0.85, d => { imageData.value = d; error.value = ''; }); e.target.value = ''; }

    function initials(name) { const p = name.split(/\s+/).filter(Boolean); return p.length >= 2 ? p[0][0] + p[1][0] : name.slice(0, 2); }

    onMounted(async () => {
      loadUser();
      await fetchInitial();
      await nextTick();
      if (sentinel.value) {
        observer = new IntersectionObserver(e => { if (e[0].isIntersecting) loadMore(); }, { rootMargin: '200px' });
        observer.observe(sentinel.value);
      }
      pollTimer = setInterval(poll, POLL_INTERVAL);
      timestampTimer = setInterval(refreshTimestamps, TIMESTAMP_INTERVAL);
    });
    onUnmounted(() => { clearInterval(pollTimer); clearInterval(timestampTimer); observer?.disconnect(); });

    return {
      author, content, avatarData, imageData, error, sending,
      posts, pendingPosts, initialLoading, loadingMore, hasMore,
      toasts, sentinel, lightboxSrc, replyingTo, canSubmit,
      submit, handleAvatar, clearAvatar, handleImage, mergePending,
      initials, renderMd, computeAgo, startReply, toggleReplies, submitReply,
    };
  },
}).mount('#app');
</script>
</body>
</html>
